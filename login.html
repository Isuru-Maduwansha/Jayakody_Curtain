<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Jayakody Curtains</title>

   <!-- font linked -->
   <link rel="stylesheet" href="./css/font.css" />

   <!-- bootstrap css linked -->
   <link rel="stylesheet" href="./bootstrap-5.3.8/css/bootstrap.min.css" />

   <!-- custom css linked -->
   <link rel="stylesheet" href="./css/login.css" />

</head>

<body>
   <main class="login-hero">
      <img src="./media/login-background.png" alt="login background image" class="login-heroimage">
      <section class="container-fluid">
         <form action="/login" method="post" class="p-4">
            <div class="mt-2">
               <h1 class="text-center login-header">Log In</h1>
            </div>
            <div class="form-floating mt-4">
               <input type="text" class="form-control bg-transparent input-style" id="floatingUsername" name="username"
                  placeholder="User Name" required />
               <label for="floatingUsername">User Name</label>
            </div>
            <div class="form-floating mt-3">
               <input type="password" class="form-control bg-transparent input-style" id="floatingPassword"
                  name="password" placeholder="Password" required />
               <label for="floatingPassword ">Password</label>
            </div>
            <div class="align-self-center mt-4 mb-3">
               <button type="submit" class="btn-login">Log in</button>
            </div>
         </form>
      </section>
   </main>

   <!-- add footerfragment -->
   <div th:replace="footer :: footerFragment"></div>

   <!-- link custom javaScript -->
   <script src="./javaScript/login.js"></script>
</body>

</html>
